<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="40%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d0d2a"/>
    </linearGradient>
    <linearGradient id="greenA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#25D366"/>
      <stop offset="100%" style="stop-color:#128C7E"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366"/>
      <stop offset="50%" style="stop-color:#128C7E"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgA)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#greenA)"/>

  <!-- Decorative neural network lines -->
  <g opacity="0.08" stroke="#25D366" stroke-width="1" fill="none">
    <line x1="200" y1="100" x2="400" y2="250"/>
    <line x1="400" y1="250" x2="600" y2="150"/>
    <line x1="600" y1="150" x2="800" y2="300"/>
    <line x1="800" y1="300" x2="1000" y2="200"/>
    <line x1="300" y1="400" x2="500" y2="300"/>
    <line x1="500" y1="300" x2="700" y2="450"/>
    <line x1="700" y1="450" x2="900" y2="350"/>
    <line x1="150" y1="300" x2="350" y2="200"/>
    <line x1="850" y1="150" x2="1050" y2="350"/>
    <circle cx="200" cy="100" r="4" fill="#25D366"/>
    <circle cx="400" cy="250" r="4" fill="#25D366"/>
    <circle cx="600" cy="150" r="4" fill="#25D366"/>
    <circle cx="800" cy="300" r="4" fill="#25D366"/>
    <circle cx="1000" cy="200" r="4" fill="#25D366"/>
    <circle cx="300" cy="400" r="4" fill="#6366f1"/>
    <circle cx="500" cy="300" r="4" fill="#6366f1"/>
    <circle cx="700" cy="450" r="4" fill="#6366f1"/>
    <circle cx="900" cy="350" r="4" fill="#6366f1"/>
  </g>

  <!-- Central brain icon -->
  <g transform="translate(530, 60)" filter="url(#neonGlow)">
    <circle cx="70" cy="45" r="42" fill="none" stroke="url(#brainGrad)" stroke-width="2"/>
    <text x="70" y="58" text-anchor="middle" font-size="38">🧠</text>
  </g>

  <!-- Header -->
  <text x="600" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#25D366" font-weight="600" letter-spacing="4">AGENTIC AI THAT SELLS FOR YOU</text>
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="40" fill="#ffffff" font-weight="800">6 Autonomous AI Agents</text>
  <text x="600" y="235" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#667788">Working 24/7 to qualify, nurture, close, and optimize your sales pipeline</text>

  <!-- Agent Cards: 3x2 Grid -->

  <!-- Row 1 -->
  <!-- Agent 1: Sales Closer -->
  <g transform="translate(40, 265)" filter="url(#softShadow)">
    <rect width="370" height="150" rx="14" fill="#0f1f15" stroke="#25D366" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="20" y="20" width="44" height="44" rx="12" fill="#25D366" opacity="0.12"/>
    <text x="42" y="50" text-anchor="middle" font-size="22">🤖</text>
    <text x="78" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="700">AI Sales Closer</text>
    <text x="78" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#25D366" font-weight="600">CORE AGENT</text>
    <text x="20" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">Generates sales replies, qualifies leads (BANT),</text>
    <text x="20" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">scores intent 0-100, handles objections, and</text>
    <text x="20" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">closes deals. 3 modes: balanced / direct / consultative.</text>
    <text x="20" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#556677">Multi-language · Gemini / OpenRouter / Ollama</text>
  </g>

  <!-- Agent 2: Outbound Prospecting -->
  <g transform="translate(420, 265)" filter="url(#softShadow)">
    <rect width="370" height="150" rx="14" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="20" y="20" width="44" height="44" rx="12" fill="#3b82f6" opacity="0.12"/>
    <text x="42" y="50" text-anchor="middle" font-size="22">📡</text>
    <text x="78" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="700">Outbound Prospecting</text>
    <text x="78" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#60a5fa" font-weight="600">GROWTH AGENT</text>
    <text x="20" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">Proactively reaches out to potential leads</text>
    <text x="20" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">with configurable daily limits, cooldowns,</text>
    <text x="20" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">and personalized outbound message templates.</text>
    <text x="20" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#556677">Max 20/day · Smart cooldowns · Template rotation</text>
  </g>

  <!-- Agent 3: Goal Planner -->
  <g transform="translate(800, 265)" filter="url(#softShadow)">
    <rect width="370" height="150" rx="14" fill="#1a150f" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="20" y="20" width="44" height="44" rx="12" fill="#f59e0b" opacity="0.12"/>
    <text x="42" y="50" text-anchor="middle" font-size="22">🎯</text>
    <text x="78" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="700">Goal Planner</text>
    <text x="78" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fbbf24" font-weight="600">STRATEGY AGENT</text>
    <text x="20" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">Sets weekly targets for bookings, revenue,</text>
    <text x="20" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">leads, and replies. Computes actionable</text>
    <text x="20" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">plans with real-time progress tracking.</text>
    <text x="20" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#556677">Weekly targets · Action plans · Progress dashboard</text>
  </g>

  <!-- Row 2 -->
  <!-- Agent 4: Prompt Tuning -->
  <g transform="translate(40, 435)" filter="url(#softShadow)">
    <rect width="370" height="150" rx="14" fill="#150f1a" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="20" y="20" width="44" height="44" rx="12" fill="#a855f7" opacity="0.12"/>
    <text x="42" y="50" text-anchor="middle" font-size="22">🔧</text>
    <text x="78" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="700">Prompt Tuning</text>
    <text x="78" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c084fc" font-weight="600">OPTIMIZATION AGENT</text>
    <text x="20" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">Self-optimizing AI that analyzes reply rates</text>
    <text x="20" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">and booking conversions, then auto-adjusts</text>
    <text x="20" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">its own config to maximize performance.</text>
    <text x="20" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#556677">Auto-tuning · Outcome analysis · Config evolution</text>
  </g>

  <!-- Agent 5: Offer Authority -->
  <g transform="translate(420, 435)" filter="url(#softShadow)">
    <rect width="370" height="150" rx="14" fill="#1a0f15" stroke="#ec4899" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="20" y="20" width="44" height="44" rx="12" fill="#ec4899" opacity="0.12"/>
    <text x="42" y="50" text-anchor="middle" font-size="22">💰</text>
    <text x="78" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="700">Offer Authority</text>
    <text x="78" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f472b6" font-weight="600">PRICING AGENT</text>
    <text x="20" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">AI-powered dynamic discounts with guardrails.</text>
    <text x="20" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">Computes personalized offers based on lead</text>
    <text x="20" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">score with max discount &amp; per-lead limits.</text>
    <text x="20" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#556677">Urgency windows · Payment plans · Discount caps</text>
  </g>

  <!-- Agent 6: Self-Healing -->
  <g transform="translate(800, 435)" filter="url(#softShadow)">
    <rect width="370" height="150" rx="14" fill="#0f1a1a" stroke="#14b8a6" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="20" y="20" width="44" height="44" rx="12" fill="#14b8a6" opacity="0.12"/>
    <text x="42" y="50" text-anchor="middle" font-size="22">🛡️</text>
    <text x="78" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="700">Self-Healing</text>
    <text x="78" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2dd4bf" font-weight="600">RELIABILITY AGENT</text>
    <text x="20" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">Monitors workflow health, detects broken</text>
    <text x="20" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">or stuck configurations, and applies auto-</text>
    <text x="20" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#99aabb">fixes to keep the system running 24/7.</text>
    <text x="20" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#556677">Health checks · Auto-repair · Zero downtime</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="618" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4b5563">Powered by Google Gemini · OpenRouter · Ollama — Your AI sales team that never sleeps</text>
  <rect x="0" y="626" width="1200" height="4" fill="url(#greenA)"/>
</svg>