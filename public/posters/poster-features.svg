    <text x="40" y="47" text-anchor="middle" font-size="22">🤖</text>
    <text x="75" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="700">AI Sales Closer</text>
    <text x="25" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#99aabb">Qualifies leads, handles objections, detects</text>
    <text x="25" y="98" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#99aabb">intent, and closes deals — in any language.</text>
    <g transform="translate(25, 115)">
      <rect width="95" height="24" rx="12" fill="#25D366" opacity="0.12"/>
      <text x="48" y="16" text-anchor="middle" font-size="10" fill="#25D366" font-weight="600" font-family="'Segoe UI', Arial, sans-serif">Lead Scoring</text>
      <rect x="105" width="110" height="24" rx="12" fill="#25D366" opacity="0.12"/>
      <text x="160" y="16" text-anchor="middle" font-size="10" fill="#25D366" font-weight="600" font-family="'Segoe UI', Arial, sans-serif">Multi-Language</text>
