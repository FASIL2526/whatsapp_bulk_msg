  <text x="600" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="42" fill="#ffffff" font-weight="800">Everything You Need to Scale Sales</text>
  <text x="600" y="135" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#667788">One platform. 37 services. Zero complexity.</text>

  <!-- ROW 1: 3 Feature Cards -->

