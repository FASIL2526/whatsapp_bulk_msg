      <text x="133" y="16" text-anchor="middle" font-size="10" fill="#c084fc" font-weight="600" font-family="'Segoe UI', Arial, sans-serif">Re-Engage</text>
      <rect x="190" width="95" height="24" rx="12" fill="#a855f7" opacity="0.12"/>
      <text x="238" y="16" text-anchor="middle" font-size="10" fill="#c084fc" font-weight="600" font-family="'Segoe UI', Arial, sans-serif">Escalation</text>
    </g>
