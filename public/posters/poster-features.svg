      <text x="138" y="16" text-anchor="middle" font-size="10" fill="#f472b6" font-weight="600" font-family="'Segoe UI', Arial, sans-serif">Heatmaps</text>
      <rect x="195" width="110" height="24" rx="12" fill="#ec4899" opacity="0.12"/>
      <text x="250" y="16" text-anchor="middle" font-size="10" fill="#f472b6" font-weight="600" font-family="'Segoe UI', Arial, sans-serif">CSV Export</text>
    </g>
    <text x="25" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#556677">Response times · Funnel · Pipeline · Revenue · Daily digest</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#green)"/>

  <!-- Footer text -->
  <text x="600" y="600" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#445566">RestartX — Deploy with Docker in minutes · No database required · From $0/month</text>
</svg>