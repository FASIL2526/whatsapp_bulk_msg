    <circle cx="40" cy="40" r="22" fill="#ec4899" opacity="0.15"/>
    <text x="40" y="47" text-anchor="middle" font-size="22">📈</text>
    <text x="75" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="700">Real-Time Analytics</text>
    <text x="25" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#99aabb">Charts, heatmaps, revenue tracking, AI</text>
    <text x="25" y="98" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#99aabb">performance metrics &amp; CSV export.</text>
